name: Release Readiness Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master

jobs:
  windows-validation:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run compile validation
        run: python -m compileall src run_app.py tests

      - name: Build Windows executable
        shell: pwsh
        run: .\scripts\Build-Windows-Exe.ps1

      - name: Verify packaged executable exists
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "dist\PDF-TO-ESX-Agent\PDF-TO-ESX-Agent.exe"
          if (-not (Test-Path $exePath)) {
              throw "Expected packaged executable was not produced: $exePath"
          }
          Write-Host "Packaged executable present: $exePath"

      - name: Validate markdown links
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import re
          import sys

          root = Path.cwd()
          files = [path for path in root.rglob("*.md") if ".venv" not in path.parts]
          pattern = re.compile(r"\[[^\]]+\]\(([^)]+)\)")
          errors = []
          for file_path in files:
              text = file_path.read_text(encoding="utf-8")
              for match in pattern.finditer(text):
                  target = match.group(1).strip()
                  if not target or target.startswith(("http://", "https://", "mailto:", "#")):
                      continue
                  target = target.split("#", 1)[0]
                  resolved = (file_path.parent / target).resolve()
                  if not resolved.exists():
                      errors.append(f"{file_path.relative_to(root)} -> {target}")
          if errors:
              print("Broken markdown links found:")
              for error in errors:
                  print(error)
              sys.exit(1)
          print(f"Checked {len(files)} markdown files. All local links resolved.")
          '@ | python -

      - name: Verify public release assets
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import sys

          root = Path.cwd()
          required = [
              "README.md",
              "LICENSE",
              "CODE_OF_CONDUCT.md",
              "CONTRIBUTING.md",
              "SECURITY.md",
              "SUPPORT.md",
              "CHANGELOG.md",
              "ROADMAP.md",
              "RELEASE_CHECKLIST.md",
              "OPEN_SOURCE_PHILOSOPHY.md",
              "MAINTAINER_GUIDE.md",
              "PUBLIC_RELEASE_NOTES_DRAFT.md",
              "PDF-TO-ESX-Agent.spec",
              "docs/WINDOWS_EXE_BUILD.md",
              "scripts/Build-Windows-Exe.ps1",
              "scripts/Build-Windows-Exe.bat",
              ".github/ISSUE_TEMPLATE/bug_report.md",
              ".github/ISSUE_TEMPLATE/feature_request.md",
              ".github/ISSUE_TEMPLATE/parser_layout_support.md",
              ".github/ISSUE_TEMPLATE/esx_output_problem.md",
              ".github/PULL_REQUEST_TEMPLATE.md",
              "docs_repo/09_RELEASE_AND_OPEN_SOURCE/PUBLIC_REPO_COMPLETION_STATUS.md",
          ]
          missing = [path for path in required if not (root / path).exists()]
          if missing:
              print("Missing required public release assets:")
              for path in missing:
                  print(path)
              sys.exit(1)
          print("Public release assets are present.")
          '@ | python -
